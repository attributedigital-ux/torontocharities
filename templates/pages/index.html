{% extends "base.html" %}

{% block styles %}
<style>
/* ── Homepage-specific styles only ─────────────────────── */

.bn-hero {
  min-height: 100vh;
  background: var(--primary);
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.bn-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(45,94,62,0.4) 0%, transparent 60%);
  pointer-events: none;
}
.bn-hero__inner {
  position: relative;
  z-index: 1;
  padding: 140px 0 100px;
  max-width: 680px;
}
.bn-hero__eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent-lt);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.bn-hero__eyebrow::before {
  content: '';
  display: block;
  width: 36px;
  height: 1px;
  background: var(--accent-lt);
}
.bn-hero__h1 {
  font-size: clamp(48px, 6vw, 82px);
  font-weight: 600;
  color: var(--cream);
  line-height: 1.0;
  margin-bottom: 28px;
  letter-spacing: -0.02em;
}
.bn-hero__h1 em {
  font-style: italic;
  font-weight: 400;
  color: var(--primary-pale);
}
.bn-hero__intro {
  font-size: 17px;
  font-weight: 300;
  color: rgba(245,239,224,0.75);
  line-height: 1.7;
  margin-bottom: 40px;
}
.bn-hero__ctas {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

@media (max-width: 768px) {
  .bn-hero__inner { padding: 120px 0 80px; }
  .bn-hero__h1 { font-size: 42px; }
}
</style>
{% endblock %}

{% block content %}

<!-- HERO -->
<section class="bn-hero">
  <div class="bn-container">
    <div class="bn-hero__inner">
      <p class="bn-hero__eyebrow">Serving [Area] Since [Year]</p>
      <h1 class="bn-hero__h1">Your headline<br><em>goes here.</em></h1>
      <p class="bn-hero__intro">A short, punchy intro sentence about what the business does and who it serves. Keep it to two lines maximum.</p>
      <div class="bn-hero__ctas">
        <a href="/contact/" class="bn-btn bn-btn--cream">Get a Free Quote</a>
        <a href="tel:{{ phone_href }}" class="bn-btn bn-btn--ghost">{{ phone_display }}</a>
      </div>
    </div>
  </div>
</section>

<!-- Add more sections here -->

{% endblock %}
